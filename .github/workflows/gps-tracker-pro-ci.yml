name: GPS Tracker Pro CI

on:
  push:
    paths:
      - 'gps-tracker-pro/**'
      - '.github/workflows/gps-tracker-pro-ci.yml'
  pull_request:
    paths:
      - 'gps-tracker-pro/**'
      - '.github/workflows/gps-tracker-pro-ci.yml'

defaults:
  run:
    working-directory: gps-tracker-pro

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: gps-tracker-pro/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund false

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
