name: CI

on:
  push:
    paths:
      - 'gps-tracker-pro/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'gps-tracker-pro/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: gps-tracker-pro

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: gps-tracker-pro/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund false

      - name: Security audit
        run: npm audit --audit-level=moderate
