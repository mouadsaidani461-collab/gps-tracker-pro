# CSRF validation for mutating /api/* requests (double-submit cookie).
# Login POST /api/session is exempt — token is issued after successful auth.
set $csrf_fail "";
if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
    set $csrf_fail "M";
}
if ($uri = /api/session) {
    set $csrf_fail "";
}
if ($http_x_csrf_token != $cookie_capture_csrf) {
    set $csrf_fail "${csrf_fail}T";
}
if ($csrf_fail = "MT") {
    return 403;
}
