# CSRF double-submit validation for mutating /api/* requests.
# Compares X-CSRF-Token header to capture_csrf cookie (HttpOnly, set via /api/_csrf-bootstrap).
# POST /api/session (login) is exempt — token is issued after successful auth.
set $csrf_fail "";
if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
    set $csrf_fail "M";
}
if ($uri = /api/session) {
    set $csrf_fail "";
}
if ($uri = /api/_csrf-bootstrap) {
    set $csrf_fail "";
}
if ($http_x_csrf_token = "") {
    set $csrf_fail "${csrf_fail}E";
}
if ($cookie_capture_csrf = "") {
    set $csrf_fail "${csrf_fail}C";
}
if ($http_x_csrf_token != $cookie_capture_csrf) {
    set $csrf_fail "${csrf_fail}T";
}
if ($csrf_fail ~ ^M.*[ECT]) {
    return 403;
}
