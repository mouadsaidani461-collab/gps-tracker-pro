# Edge reverse proxy — SSL termination for gps-tracker-pro.ma
# Certificates: /etc/letsencrypt/live/${DOMAIN}/ (mounted by certbot)

upstream capture_frontend {
    server frontend:80;
    keepalive 8;
}

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gps-tracker-pro.ma www.gps-tracker-pro.ma;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — public entry point
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gps-tracker-pro.ma www.gps-tracker-pro.ma;

    ssl_certificate     /etc/letsencrypt/live/gps-tracker-pro.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gps-tracker-pro.ma/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 10m;

    location / {
        proxy_pass http://capture_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 86400s;
    }
}
