# Shared security headers — included in edge + app nginx
# HSTS is set only on HTTPS (edge.conf)

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://server.arcgisonline.com https://*.openstreetmap.org https://*.cartocdn.com; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
