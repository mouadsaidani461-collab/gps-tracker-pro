# Edge reverse proxy — HTTP only (local / pre-SSL production testing)
# Use when Let's Encrypt certificates are not yet available.
# Set EDGE_NGINX_CONF=./docker/nginx/edge.conf after SSL init on the server.

limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

upstream capture_frontend {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 10m;

    # Let's Encrypt ACME (required before SSL init)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /api/session {
        limit_req zone=login_limit burst=2 nodelay;

        proxy_pass http://capture_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 86400s;
    }

    location /api/ {
        include /etc/nginx/snippets/csrf.conf;

        proxy_pass http://capture_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://capture_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 86400s;
    }
}
