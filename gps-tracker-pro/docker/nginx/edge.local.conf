# Edge reverse proxy — HTTP only (local / pre-SSL production testing)
# Use when Let's Encrypt certificates are not yet available.
# Set EDGE_NGINX_CONF=./docker/nginx/edge.conf after SSL init on the server.

upstream capture_frontend {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 10m;

    location / {
        proxy_pass http://capture_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 86400s;
    }
}
