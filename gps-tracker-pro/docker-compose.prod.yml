# Capture Tracking GPS — production stack (Hetzner)
# PostgreSQL + Traccar + app (nginx/static) + edge SSL + certbot renewal
#
# Usage:
#   cp .env.production.example .env.production
#   ./scripts/deploy-production.sh init
#
# See docs/DEPLOY-HETZNER.md

name: capture-gps-production

services:
  edge:
    image: nginx:alpine-slim
    container_name: capture-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${EDGE_NGINX_CONF:-./docker/nginx/edge.local.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/security-headers.conf:/etc/nginx/snippets/security-headers.conf:ro
      - ./docker/nginx/csrf.conf:/etc/nginx/snippets/csrf.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - capture-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  certbot:
    image: certbot/certbot:latest
    container_name: capture-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks:
      - capture-net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_MAP_TILE_URL: ${VITE_MAP_TILE_URL}
    image: capture-tracking-gps:${IMAGE_TAG:-latest}
    container_name: capture-tracking-gps
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      traccar-init:
        condition: service_completed_successfully
    networks:
      capture-net:
        aliases:
          - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:14-alpine
    container_name: capture-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traccar}
      POSTGRES_USER: ${POSTGRES_USER:-traccar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - capture-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traccar} -d ${POSTGRES_DB:-traccar}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  traccar:
    image: traccar/traccar:latest
    container_name: traccar
    restart: unless-stopped
    environment:
      CONFIG_USE_ENVIRONMENT_VARIABLES: "true"
      WEB_REGISTRATION: "false"
      WEB_SERVICE_ACCOUNT_TOKEN: ${TRACCAR_SERVICE_TOKEN:?TRACCAR_SERVICE_TOKEN required}
      DATABASE_DRIVER: org.postgresql.Driver
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-traccar}
      DATABASE_USER: ${POSTGRES_USER:-traccar}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - traccar-data:/opt/traccar
      - ./docker/traccar.postgres.xml:/opt/traccar/conf/traccar.xml:ro
    expose:
      - "8082"
      - "5023"
    ports:
      - "${GPS_PUBLIC_PORT:-127.0.0.1:5023}:5023"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capture-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/api/server"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  traccar-init:
    image: curlimages/curl:8.12.1
    container_name: traccar-init
    depends_on:
      traccar:
        condition: service_healthy
    environment:
      TRACCAR_URL: http://traccar:8082
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD required}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      TRACCAR_SERVICE_TOKEN: ${TRACCAR_SERVICE_TOKEN:?TRACCAR_SERVICE_TOKEN required}
      DISABLE_REGISTRATION: "true"
    volumes:
      - ./scripts/setup-traccar-admin.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks:
      - capture-net
    restart: "no"

networks:
  capture-net:
    driver: bridge

volumes:
  postgres-data:
  traccar-data:
  certbot-etc:
  certbot-www:
