      <circle cx="28" cy="28" r="14" fill="url(#crosshair-glow)" opacity="0.5"/>
      <circle cx="28" cy="28" r="11" fill="none" stroke="url(#cyan-ring)" stroke-width="0.75" opacity="0.5"/>
      <circle cx="28" cy="28" r="7" fill="none" stroke="#06b6d4" stroke-width="0.75" opacity="0.7"/>
      <circle cx="28" cy="28" r="3" fill="#06b6d4"/>
      <line x1="28" y1="14" x2="28" y2="22" stroke="#67e8f9" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="28" y1="34" x2="28" y2="42" stroke="#67e8f9" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="14" y1="28" x2="22" y2="28" stroke="#67e8f9" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="34" y1="28" x2="42" y2="28" stroke="#67e8f9" stroke-width="1.25" stroke-linecap="round"/>
      <path d="M16 18 L16 14 L20 14" stroke="#06b6d4" stroke-width="0.75" fill="none" opacity="0.6"/>
      <path d="M40 18 L40 14 L36 14" stroke="#06b6d4" stroke-width="0.75" fill="none" opacity="0.6"/>
      <path d="M16 38 L16 42 L20 42" stroke="#06b6d4" stroke-width="0.75" fill="none" opacity="0.6"/>
      <path d="M40 38 L40 42 L36 42" stroke="#06b6d4" stroke-width="0.75" fill="none" opacity="0.6"/>
    </g>
  </g>
