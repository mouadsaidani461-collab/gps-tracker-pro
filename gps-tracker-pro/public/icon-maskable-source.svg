<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Capture Tracking GPS">
  <defs>
    <linearGradient id="shield-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="35%" stop-color="#94a3b8"/>
      <stop offset="65%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="shield-inner" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="crosshair-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe zone: logo scaled to ~66% with extra padding for adaptive Android icons -->
  <g transform="translate(32 32) scale(0.66) translate(-32 -32)">
    <g transform="translate(4, 4)">
      <path d="M28 2 L52 10 C52 10 54 38 28 54 C2 38 4 10 4 10 L28 2 Z" fill="url(#shield-metal)" stroke="#475569" stroke-width="0.75"/>
